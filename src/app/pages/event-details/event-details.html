<section
  class="details-shell"
  *ngIf="event"
>

  <div class="details-hero">
    <img
      [src]="event.image"
      [alt]="event.title"
    >

    <div class="hero-content">
      <p class="category-pill">
        {{ event.category }}
      </p>

      <h1>
        {{ event.title }}
      </h1>

      <p class="description">
        {{ event.description }}
      </p>

      <div class="meta-grid">
        <div>
          <span class="meta-label">Date</span>
          <strong>{{ event.date }}</strong>
        </div>

        <div>
          <span class="meta-label">Venue</span>
          <strong>{{ event.venue }}</strong>
        </div>

        <div>
          <span class="meta-label">Ticket Price</span>
          <strong>Rs. {{ event.price }}</strong>
        </div>
      </div>
    </div>
  </div>

  <div class="booking-panel">
    <div class="panel-copy">
      <h2>
        Reserve your seat
      </h2>

      <p>
        Complete the booking form below to secure your place for this event.
      </p>
    </div>

    <app-booking-form
      [eventTitle]="event.title"
    ></app-booking-form>
  </div>

</section>
