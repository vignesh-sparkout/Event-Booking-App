<section class="auth-shell">

  <form
    class="auth-card"
    [formGroup]="loginForm"
    (ngSubmit)="signIn()"
  >
    <p class="eyebrow">
      User Sign In
    </p>

    <h1>
      Welcome back
    </h1>

    <p class="intro">
      Sign in with your registered account to book tickets.
    </p>

    <label>
      <span>Email</span>
      <input
        type="email"
        placeholder="Enter your email"
        formControlName="email"
        [class.input-error]="loginForm.controls.email.invalid && loginForm.controls.email.touched"
      >

      <small
        class="field-error"
        *ngIf="loginForm.controls.email.errors?.['required'] && loginForm.controls.email.touched"
      >
        Email is required.
      </small>

      <small
        class="field-error"
        *ngIf="loginForm.controls.email.errors?.['email'] && loginForm.controls.email.touched"
      >
        Please enter a valid email address.
      </small>
    </label>

    <label>
      <span>Password</span>
      <input
        type="password"
        placeholder="Enter password"
        formControlName="password"
        [class.input-error]="loginForm.controls.password.invalid && loginForm.controls.password.touched"
      >

      <small
        class="field-error"
        *ngIf="loginForm.controls.password.errors?.['required'] && loginForm.controls.password.touched"
      >
        Password is required.
      </small>

      <small
        class="field-error"
        *ngIf="loginForm.controls.password.errors?.['minlength'] && loginForm.controls.password.touched"
      >
        Password must be at least 6 characters.
      </small>
    </label>

    <p
      class="error-message"
      *ngIf="errorMessage"
    >
      {{ errorMessage }}
    </p>

    <button type="submit">
      Sign In
    </button>

    <div class="auth-links">
      <a
        routerLink="/register"
        [queryParams]="{
          returnUrl: returnUrl
        }"
      >
        Create account
      </a>

      <a routerLink="/events">
        Browse events
      </a>
    </div>
  </form>

</section>
