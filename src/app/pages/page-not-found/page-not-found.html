<main class="not-found-page">
  <div class="floating-shapes" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <section class="not-found-panel">
    <div class="status-orbit" aria-hidden="true">
      <i></i>
      <span>404</span>
    </div>

    <div class="not-found-copy">
      <p class="eyebrow">Page not found</p>

      <h1>That event path does not exist.</h1>

      <p class="message">
        We could not find
        <strong>{{ requestedUrl }}</strong>.
        Check the address or return to a working page.
      </p>

      <div class="actions">
        <button type="button" (click)="goHome()">
          Back to Home
        </button>

        <a routerLink="/events">
          Browse Events
        </a>
      </div>
    </div>
  </section>
</main>
