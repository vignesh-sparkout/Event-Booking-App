<section class="login-shell">

  <form
    class="login-card"
    (ngSubmit)="login()"
  >
    <p class="eyebrow">
      Admin Access
    </p>

    <h1>
      Admin Sign In
    </h1>

    <p class="intro">
      Sign in to create events, manage bookings, and view attendee reports.
    </p>

    <label>
      <span>Email</span>
      <input
        type="email"
        placeholder="admin@example.com"
        [(ngModel)]="email"
        name="email"
        required
      >
    </label>

    <label>
      <span>Password</span>
      <input
        type="password"
        placeholder="Enter password"
        [(ngModel)]="password"
        name="password"
        required
      >
    </label>

    <p
      class="error-message"
      *ngIf="errorMessage"
    >
      {{ errorMessage }}
    </p>

    <button type="submit">
      Sign In
    </button>

    <a
      routerLink="/"
      class="back-link"
    >
      Back to events
    </a>
  </form>

</section>
