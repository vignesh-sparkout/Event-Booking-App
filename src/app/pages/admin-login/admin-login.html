<section class="login-shell">

  <form
    #loginForm="ngForm"
    class="login-card"
    (ngSubmit)="login(loginForm)"
  >
    <p class="eyebrow">
      Admin Access
    </p>

    <p class="intro">
      Sign in to create events.
    </p>

    <label>
      <span>Email</span>
      <input
        #emailInput="ngModel"
        type="email"
        placeholder="admin@gmail.com"
        [(ngModel)]="email"
        name="email"
        [class.input-error]="emailInput.invalid && emailInput.touched"
        [disabled]="showSuccessModal"
        email
        required
      >

      <small
        class="field-error"
        *ngIf="emailInput.errors?.['required'] && emailInput.touched"
      >
        Email is required.
      </small>

      <small
        class="field-error"
        *ngIf="emailInput.errors?.['email'] && emailInput.touched"
      >
        Please enter a valid email address.
      </small>
    </label>

    <label>
      <span>Password</span>
      <input
        #passwordInput="ngModel"
        type="password"
        placeholder="Enter password"
        [(ngModel)]="password"
        name="password"
        [class.input-error]="passwordInput.invalid && passwordInput.touched"
        [disabled]="showSuccessModal"
        minlength="6"
        required
      >

      <small
        class="field-error"
        *ngIf="passwordInput.errors?.['required'] && passwordInput.touched"
      >
        Password is required.
      </small>

      <small
        class="field-error"
        *ngIf="passwordInput.errors?.['minlength'] && passwordInput.touched"
      >
        Password must be at least 6 characters.
      </small>
    </label>

    <p
      class="error-message"
      *ngIf="errorMessage"
    >
      {{ errorMessage }}
    </p>

    <button
      type="submit"
      [disabled]="showSuccessModal"
    >
      Sign In
    </button>

    <a
      routerLink="/"
      class="back-link"
    >
      Back to events
    </a>
  </form>

  <div
    class="success-modal-backdrop"
    *ngIf="showSuccessModal"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="admin-login-success-title"
  >
    <div class="success-modal">
      <h2 id="admin-login-success-title">
        Login successful
      </h2>

      <p>
        Welcome back, admin. Redirecting to your organizer panel.
      </p>

      <div class="redirect-loader"></div>
    </div>
  </div>

</section>
