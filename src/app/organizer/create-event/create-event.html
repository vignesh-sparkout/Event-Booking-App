<div class="create-layout">

  <app-sidebar></app-sidebar>

  <div class="form-shell">

    <div class="form-header">
      <p class="eyebrow">
        Organizer Workspace
      </p>

      <h1>
        Create Event
      </h1>

      <p class="intro">
        Add all event details attendees need before they book.
      </p>
    </div>

    <form
      class="event-form"
      (ngSubmit)="createEvent()"
    >

      <div class="input-grid">

        <label>
          <span>Event Title</span>
          <input
            type="text"
            placeholder="Angular Conference 2026"
            [(ngModel)]="title"
            name="title"
            required
          >
        </label>

        <label>
          <span>Category</span>
          <select
            [(ngModel)]="category"
            name="category"
            required
          >
            <option
              *ngFor="let item of categories"
              [value]="item"
            >
              {{ item }}
            </option>
          </select>
        </label>

        <label class="full-width">
          <span>Description</span>
          <textarea
            placeholder="Describe the event, schedule, speakers, and experience."
            [(ngModel)]="description"
            name="description"
            required
          ></textarea>
        </label>

        <label>
          <span>Start Date & Time</span>
          <input
            type="datetime-local"
            [(ngModel)]="startDateTime"
            name="startDateTime"
            required
          >
        </label>

        <label>
          <span>End Date & Time</span>
          <input
            type="datetime-local"
            [(ngModel)]="endDateTime"
            name="endDateTime"
            required
          >
        </label>

        <label>
          <span>Venue</span>
          <input
            type="text"
            placeholder="Chennai Trade Centre"
            [(ngModel)]="venue"
            name="venue"
            required
          >
        </label>

        <label>
          <span>City</span>
          <input
            type="text"
            placeholder="Chennai"
            [(ngModel)]="city"
            name="city"
            required
          >
        </label>

        <label class="full-width">
          <span>Venue Address</span>
          <input
            type="text"
            placeholder="Full address"
            [(ngModel)]="address"
            name="address"
            required
          >
        </label>

        <label>
          <span>Ticket Price</span>
          <input
            type="number"
            min="0"
            placeholder="0 for free"
            [(ngModel)]="price"
            name="price"
            required
          >
        </label>

        <label>
          <span>Total Seats</span>
          <input
            type="number"
            min="1"
            placeholder="100"
            [(ngModel)]="totalSeats"
            name="totalSeats"
            required
          >
        </label>

        <label>
          <span>Organizer Name</span>
          <input
            type="text"
            placeholder="Organizer or company"
            [(ngModel)]="organizerName"
            name="organizerName"
            required
          >
        </label>

        <label>
          <span>Organizer Email</span>
          <input
            type="email"
            placeholder="organizer@example.com"
            [(ngModel)]="organizerEmail"
            name="organizerEmail"
            required
          >
        </label>

        <label>
          <span>Cover Image Path</span>
          <input
            type="text"
            placeholder="images/workshop-event.jpg"
            [(ngModel)]="image"
            name="image"
          >
        </label>

        <label>
          <span>Gallery Paths</span>
          <input
            type="text"
            placeholder="images/a.jpg, images/b.jpg"
            [(ngModel)]="galleryText"
            name="galleryText"
          >
        </label>

        <label class="full-width">
          <span>Rules / Contact / Additional Info</span>
          <textarea
            placeholder="Rules, contact number, entry notes, refund policy."
            [(ngModel)]="additionalInfo"
            name="additionalInfo"
          ></textarea>
        </label>

      </div>

      <button type="submit">
        Create Event
      </button>

    </form>

  </div>

</div>
