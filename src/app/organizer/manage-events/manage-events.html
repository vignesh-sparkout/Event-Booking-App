<div class="manage-layout">

  <app-sidebar></app-sidebar>

  <section class="manage-container">

    <div class="manage-header">
      <p class="eyebrow">
        Organizer Workspace
      </p>

      <h1>
        Manage Events
      </h1>

      <p>
        Review live listings, swap visuals, and remove outdated events from your catalog.
      </p>
    </div>

    <div class="manage-grid">

      <article
        class="event-card"
        *ngFor="let event of events"
      >

        <img
          [src]="event.image"
          [alt]="event.title"
        >

        <div class="card-body">
          <p class="category-pill">
            {{ event.category }}
          </p>

          <h2>
            {{ event.title }}
          </h2>

          <p class="description">
            {{ event.description }}
          </p>

          <div class="meta">
            <span>{{ event.date }}</span>
            <span>{{ event.venue }}</span>
          </div>

          <strong class="price">
            Rs. {{ event.price }}
          </strong>

          <div class="button-group">
            <button
              class="edit-btn"
              [routerLink]="[
                '/organizer/edit-event',
                event.id
              ]"
            >
              Edit
            </button>

            <button
              class="delete-btn"
              (click)="deleteEvent(event.id)"
            >
              Delete
            </button>
          </div>
        </div>

      </article>

    </div>

  </section>

</div>
