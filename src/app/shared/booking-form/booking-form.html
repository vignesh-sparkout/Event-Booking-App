<div class="booking-form">

  <h2>
    Book Tickets
  </h2>

  <input
    type="text"
    placeholder="Your Name"
    [(ngModel)]="name"
    [disabled]="bookingSuccess"
  >

  <input
    type="email"
    placeholder="Your Email"
    [(ngModel)]="email"
    [disabled]="bookingSuccess"
  >

  <input
    type="text"
    placeholder="Phone Number"
    [(ngModel)]="phone"
    [disabled]="bookingSuccess"
  >

  <input
    type="number"
    placeholder="Number of Tickets"
    min="1"
    [max]="availableSeats"
    [(ngModel)]="tickets"
    [disabled]="bookingSuccess"
  >

  <p
    class="error-message"
    *ngIf="formError"
  >
    {{ formError }}
  </p>

  <p
    class="error-message"
    *ngIf="seatError"
  >
    {{ seatError }}
  </p>

  <p class="total-amount">
    Total Amount:
    {{ totalAmount === 0 ? 'Free' : 'Rs. ' + totalAmount }}
  </p>

  <button
    (click)="confirmBooking()"
    [disabled]="availableSeats === 0 || bookingSuccess"
  >
    {{
      bookingSuccess
        ? 'Booking Confirmed'
        : availableSeats === 0
          ? 'Sold Out'
          : 'Confirm Booking'
    }}
  </button>

  <div
    class="success-message"
    *ngIf="bookingSuccess"
  >

    <h3>
      Booking Successful
    </h3>

    <p>
      Booking ID:
      {{ bookingId }}
    </p>

    <p>
      You can view this ticket in My Bookings.
    </p>

  </div>

</div>
