<form
  #bookingForm="ngForm"
  class="booking-form"
  (ngSubmit)="confirmBooking(bookingForm)"
>

  <h2>
    Book Tickets
  </h2>

  <label>
    <input
      #nameInput="ngModel"
      type="text"
      placeholder="Your Name"
      [(ngModel)]="name"
      name="name"
      [class.input-error]="nameInput.invalid && nameInput.touched"
      [disabled]="bookingSuccess"
      required
    >

    <small
      class="field-error"
      *ngIf="nameInput.errors?.['required'] && nameInput.touched"
    >
      Name is required.
    </small>
  </label>

  <label>
    <input
      #emailInput="ngModel"
      type="email"
      placeholder="Your Email"
      [(ngModel)]="email"
      name="email"
      [class.input-error]="emailInput.invalid && emailInput.touched"
      [disabled]="bookingSuccess"
      email
      required
    >

    <small
      class="field-error"
      *ngIf="emailInput.errors?.['required'] && emailInput.touched"
    >
      Email is required.
    </small>

    <small
      class="field-error"
      *ngIf="emailInput.errors?.['email'] && emailInput.touched"
    >
      Please enter a valid email address.
    </small>
  </label>

  <label>
    <input
      #phoneInput="ngModel"
      type="tel"
      placeholder="Phone Number with country code"
      [(ngModel)]="phone"
      name="phone"
      [class.input-error]="phoneInput.invalid && phoneInput.touched"
      [disabled]="bookingSuccess"
      [pattern]="phonePattern"
      required
    >

    <small
      class="field-error"
      *ngIf="phoneInput.errors?.['required'] && phoneInput.touched"
    >
      Phone number is required.
    </small>

    <small
      class="field-error"
      *ngIf="phoneInput.errors?.['pattern'] && phoneInput.touched"
    >
      Enter phone number with country code, like +91 9876543210.
    </small>
  </label>

  <label>
    <input
      #ticketsInput="ngModel"
      type="number"
      placeholder="Number of Tickets"
      min="1"
      [max]="availableSeats"
      [(ngModel)]="tickets"
      name="tickets"
      [class.input-error]="ticketsInput.invalid && ticketsInput.touched"
      [disabled]="bookingSuccess"
      required
    >

    <small
      class="field-error"
      *ngIf="ticketsInput.errors?.['required'] && ticketsInput.touched"
    >
      Number of tickets is required.
    </small>

    <small
      class="field-error"
      *ngIf="ticketsInput.errors?.['min'] && ticketsInput.touched"
    >
      Please select at least 1 ticket.
    </small>

    <small
      class="field-error"
      *ngIf="ticketsInput.errors?.['max'] && ticketsInput.touched"
    >
      Tickets cannot be more than available seats.
    </small>
  </label>

  <p
    class="error-message"
    *ngIf="formError"
  >
    {{ formError }}
  </p>

  <p
    class="error-message"
    *ngIf="seatError"
  >
    {{ seatError }}
  </p>

  <p class="total-amount">
    Total Amount:
    {{ totalAmount === 0 ? 'Free' : 'Rs. ' + totalAmount }}
  </p>

  <button
    type="submit"
    [disabled]="availableSeats === 0 || bookingSuccess"
  >
    {{
      bookingSuccess
        ? 'Booking Confirmed'
        : availableSeats === 0
          ? 'Sold Out'
          : 'Confirm Booking'
    }}
  </button>

  <div
    class="success-message"
    *ngIf="bookingSuccess"
  >

    <h3>
      Booking Successful
    </h3>

    <p>
      Booking ID:
      {{ bookingId }}
    </p>

    <p>
      You can view this ticket in My Bookings.
    </p>

  </div>

</form>
