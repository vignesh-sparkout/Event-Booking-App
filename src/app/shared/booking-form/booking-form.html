<div class="booking-form">

  <h2>
    Book Tickets
  </h2>

  <form>

    <input
      type="text"
      placeholder="Enter Name"
      [(ngModel)]="name"
      name="name"
    >

    <input
      type="email"
      placeholder="Enter Email"
      [(ngModel)]="email"
      name="email"
    >

    <input
      type="text"
      placeholder="Enter Phone"
      [(ngModel)]="phone"
      name="phone"
    >

    <input
      type="number"
      placeholder="Number of Tickets"
      [(ngModel)]="tickets"
      name="tickets"
    >

    <button
      type="button"
      (click)="confirmBooking()"
    >
      Confirm Booking
    </button>

  </form>

  <div
    class="success-message"
    *ngIf="bookingSuccess"
  >

    <h3>
      Booking Confirmed
    </h3>

    <p>
      Booking ID:
      {{ bookingId }}
    </p>

  </div>

</div>
