<nav
  class="navbar"
  [class.organizer-navbar]="isOrganizerPage"
>

  <a
    class="logo"
    routerLink="/"
    (click)="closeMenu()"
  >
    <span class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M4 9V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3a3 3 0 0 0 0 6v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3a3 3 0 0 0 0-6Z"></path>
        <path d="M10 9h4M9 13h6"></path>
      </svg>
    </span>
    <span>Event</span> Booking
  </a>

  <button
    *ngIf="!isOrganizerPage"
    type="button"
    class="menu-toggle"
    [class.menu-open]="menuOpen"
    [attr.aria-expanded]="menuOpen"
    aria-label="Toggle navigation menu"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul
    *ngIf="!isOrganizerPage"
    class="nav-links"
    [class.menu-open]="menuOpen"
  >

    <li>

      <a
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{
          exact: true
        }"
        (click)="closeMenu()"
      >
        Home
      </a>

    </li>

    <li>

      <a
        routerLink="/events"
        routerLinkActive="active-link"
        (click)="closeMenu()"
      >
        Events
      </a>

    </li>

    <li *ngIf="userState$ | async">

      <a
        routerLink="/my-bookings"
        routerLinkActive="active-link"
        (click)="closeMenu()"
      >
        My Bookings
      </a>

    </li>


    <ng-container *ngIf="userState$ | async as user; else guestUserLinks">
      <li class="user-menu">
        <span class="user-chip">
          {{ user.name || user.email }}
        </span>

        <button
          type="button"
          class="user-logout-btn"
          (click)="logoutUser()"
        >
          Logout
        </button>
      </li>
    </ng-container>

    <ng-template #guestUserLinks>
      <li>
        <a
          routerLink="/signin"
          routerLinkActive="active-link"
          (click)="closeMenu()"
        >
          Sign In
        </a>
      </li>
    </ng-template>


    <li *ngIf="!(adminState$ | async) && !(userState$ | async)">

      <a
        class="admin-login-link"
        routerLink="/admin-login"
        routerLinkActive="active-link"
        (click)="closeMenu()"
      >
        <span class="login-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="8" r="4"></circle>
          </svg>
        </span>
        Admin Login
      </a>

    </li>

  </ul>

  <button
    *ngIf="adminState$ | async"
    type="button"
    class="logout-btn"
    (click)="logout()"
  >
    Logout
  </button>

</nav>
