<nav class="navbar">

  <div class="logo">
    <span class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M4 9V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3a3 3 0 0 0 0 6v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3a3 3 0 0 0 0-6Z"></path>
        <path d="M10 9h4M9 13h6"></path>
      </svg>
    </span>
    <span>Event</span> Booking
  </div>

  <ul
    *ngIf="!isOrganizerPage"
    class="nav-links"
  >

    <li>

      <a
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{
          exact: true
        }"
      >
        Home
      </a>

    </li>

    <li>

      <a
        routerLink="/events"
        routerLinkActive="active-link"
      >
        Events
      </a>

    </li>

    <li>

      <a
        routerLink="/my-bookings"
        routerLinkActive="active-link"
      >
        My Bookings
      </a>

    </li>

    <li>

      <a
        *ngIf="adminState$ | async"
        routerLink="/organizer/dashboard"
        routerLinkActive="active-link"
      >
        Organizer
      </a>

    </li>

    <li *ngIf="!(adminState$ | async)">

      <a
        routerLink="/admin-login"
        routerLinkActive="active-link"
      >
        <span class="login-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="8" r="4"></circle>
          </svg>
        </span>
        Admin Login
      </a>

    </li>

  </ul>

  <button
    *ngIf="adminState$ | async"
    type="button"
    class="logout-btn"
    (click)="logout()"
  >
    Logout
  </button>

</nav>
